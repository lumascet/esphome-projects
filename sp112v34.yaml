substitutions:
  name: sp112
  friendly_name: SP112
  project_name: lumascet.sp112v34
  project_version: "1.6"
  relay_pin: GPIO14
  cf_pin: GPIO05
  cf1_pin: GPIO04
  flash_write_interval: 60s
  hlw_change_mode_every: "1"
  hlw_update_interval: 3s

  current_zero: "0.14"
  # Higher value gives lower power/current readout
  current_res: "0.0011184"
  # Lower value gives lower voltage readout
  voltage_div: "1632" 

dashboard_import:
  package_import_url: github://lumascet/esphome-projects/sp112v34.yaml@main
  import_full_config: false

packages:
  sp111_base: !include packages/sp112.yaml